<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Weather Boy</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <!-- code  -->
    <div id="container">
      <div id="left-div">
        <div id="searchbar">
          <input type="text" placeholder="Search for location" id="locationInput">
          <button id="locationBtn">Search</button>
        </div>
        <div id="pic"></div>
        <div id="temp"></div>
        <div id="datetime">
          <div id="day"></div>
          <div id="time"></div>
        </div>
        <div id="cloud-rain">
          <div id="cloud-coverage"></div>
          <div id="rain"></div>
        </div>
      </div>
      <div id="right-div">
        <div id="header">
          <div id="choice">
            <div id="today">
              <button id="today-selection">Today</button>
            </div>
            <div id="week">
              <button id="week-selection">Week</button>
            </div>
          </div>
          <div id="temperature-choice">
            <div id="celsius"></div>
            <div id="fahrenheit"></div>
          </div>
        </div>
        <div id="week-overview">
          <div class="weekDayCard" id="day-one"></div>
          <div class="weekDayCard" id="day-two"></div>
          <div class="weekDayCard" id="day-three"></div>
          <div class="weekDayCard" id="day-four"></div>
          <div class="weekDayCard" id="day-five"></div>
          <div class="weekDayCard" id="day-six"></div>
          <div class="weekDayCard" id="day-seven"></div>
        </div>
        <div id="today">
          <div id="title">Today's Highlights</div>
          <div id="cards">
            <div id="uvindex">
              <p>UV Index</p>
              <p id="uvidex-value"></p>
            </div>
            <div id="wind">
              <p>Wind Status</p>
              <p id="wind-speed"></p>
              <p id="wind-direction"></p>
            </div>
            <div id="sun">
              <p>Sunrise & Sunset</p>
              <p id="sunrise"></p>
              <p id="sunset"></p>
            </div>
            <div id="humidity">
              <p>Humidity</p>
              <p id="humidity-value"></p>
            </div>
            <div id="visibility">
              <p>Visibility</p>
              <p id="visibility-value"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>

</html>
